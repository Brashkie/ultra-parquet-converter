name: Release

# Se dispara al pushear un tag de versión, p.ej.:  git tag v1.4.0 && git push origin v1.4.0
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Verify & publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write   # para crear el GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'   # crea el .npmrc de auth con NODE_AUTH_TOKEN
          cache: npm

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt

      # ── Guard: el tag debe coincidir con la versión de package.json ──────────
      - name: Verify tag matches package.json version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"          # v1.4.0 -> 1.4.0
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "Tag:         $TAG_VERSION"
          echo "package.json: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::El tag ($TAG_VERSION) no coincide con package.json ($PKG_VERSION). Sincroniza antes de publicar."
            exit 1
          fi

      # ── Guard: esa versión no debe estar ya publicada en npm ─────────────────
      - name: Verify version is not already published
        shell: bash
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "::error::$PKG_NAME@$PKG_VERSION ya existe en npm. Sube la versión."
            exit 1
          fi

      # ── Checklist completo antes de publicar ─────────────────────────────────
      - name: Type-check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # ── Publicación ──────────────────────────────────────────────────────────
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── GitHub Release (opcional, con notas auto-generadas) ──────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
